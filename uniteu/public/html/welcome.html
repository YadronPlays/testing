<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome – UniteU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/welcome.css">

</head>

<body>

<main class="welcome-container">

  <section class="welcome-card">

    <div class="logo-area">
      <div class="logo-box">🎓</div>
      <h1 class="logo-text">UniteU</h1>
    </div>

    <div class="welcome-content">
      <h2>Welcome to Your University Community</h2>
      <p>
        Connect with fellow students, discover events, buy and sell items,
        and make the most of your university experience.
      </p>
    </div>

    <div class="welcome-actions">
      <button class="primary-btn" onclick="goRegister()">
        Get Started
      </button>

      <button class="secondary-btn" onclick="goLogin()">
        I Already Have an Account
      </button>
    </div>

  </section>

</main>

<script src="js/welcome.js"></script>

</body>
</html>
