<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniteU Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="public/css/styles.css">
<link rel="stylesheet" href="public/css/auth.css">

</head>

<body>

<header class="auth-header"></header>

<main class="auth-container">

  <section class="card auth-card">

    <h1 class="auth-logo">UniteU</h1>
    <p class="auth-subtitle">Create your student account</p>

    <!-- later change action to register.php -->
    <form action="login.html" method="POST" id="registerForm">

      <label>Full Name</label>
      <input class="input" type="text" name="name" required>

      <label>University Email</label>
      <input class="input" type="email" name="email" required>

      <label>Password</label>
      <input class="input" type="password" name="password" required>

      <label>Confirm Password</label>
      <input class="input" type="password" name="confirm" required>

      <button class="primary-btn" type="submit">
        Create Account
      </button>

    </form>

    <p class="auth-link">
      Already have an account?
      <a href="login.html">Sign in</a>
    </p>

  </section>

</main>

<script src="public/js/register.js"></script>

</body>
</html>
