<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniteU Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/chat-room.css">

</head>

<body>

<header class="chat-header">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="chat-user">
    <div class="avatar" id="chatAvatar"></div>
    <div>
        <h3 id="chatTitle"></h3>
        <p class="members" id="memberCount"></p>
  </div>
</div>


  </div>

  <button class="menu-btn">⋮</button>
</header>

<main class="messages-container">

  <section class="empty-chat">
    <h3>No messages yet</h3>
    <p>Start the conversation with other students.</p>
  </section>

</main>

<footer class="chat-input-bar">
  <input 
    class="input message-input"
    type="text"
    placeholder="Type a message..."
    id="messageInput"
  >
  <button class="primary-btn send-btn" onclick="sendMessage()">
    Send
  </button>
</footer>

<script src="js/chat-room.js"></script>

</body>
</html>
