<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniteU Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/events.css">

</head>

<body>

<header class="events-header">
  <div class="header-top">
    <h1>Events</h1>
    <button class="icon-btn">＋</button>
  </div>

  <div class="search-box">
    <input class="input" type="text" placeholder="Search events...">
  </div>

  <div class="categories">
    <button class="active">All</button>
    <button>Music</button>
    <button>Sports</button>
    <button>Career</button>
    <button>Workshop</button>
    <button>Social</button>
  </div>
</header>

<main class="events-container">

  <section class="empty-events">
    <h3>No events available</h3>
    <p>Upcoming university events will appear here.</p>
  </section>

</main>

<script src="js/events.js"></script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniteU Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<header class="auth-header"></header>

<main class="auth-container">

  <section class="card auth-card">

    <h1 class="auth-logo">UniteU</h1>
    <p class="auth-subtitle">Sign in to your university community</p>

    <!-- later change action to login.php -->
    <form action="home.html" method="POST">

      <label>Email</label>
      <input class="input" type="email" name="email" required>

      <label>Password</label>
      <input class="input" type="password" name="password" required>

      <button class="primary-btn" type="submit">
        Sign In
      </button>

    </form>

    <p class="auth-link">
      Don't have an account?
      <a href="register.html">Sign up</a>
    </p>

  </section>

</main>

<script src="js/auth.js"></script>

</body>
</html>
